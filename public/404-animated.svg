<svg width="640" height="220" viewBox="0 0 640 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated 404 Illustration</title>
  <desc id="desc">A simple animated 404 text with floating dots.</desc>

  <rect x="1.5" y="1.5" width="637" height="217" rx="20" stroke="#D4D4D8" stroke-width="3" />

  <text x="150" y="148" font-size="128" font-family="Arial, Helvetica, sans-serif" font-weight="800" fill="#27272A">4</text>

  <g>
    <text x="274" y="148" font-size="128" font-family="Arial, Helvetica, sans-serif" font-weight="800" fill="#15803D">0</text>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -8;0 0" dur="1.4s" repeatCount="indefinite" />
  </g>

  <g>
    <text x="398" y="148" font-size="128" font-family="Arial, Helvetica, sans-serif" font-weight="800" fill="#27272A">4</text>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 6;0 0" dur="1.4s" begin="0.2s" repeatCount="indefinite" />
  </g>

  <circle cx="92" cy="62" r="6" fill="#16A34A">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="530" cy="60" r="5" fill="#16A34A">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite" />
  </circle>
  <circle cx="560" cy="168" r="5" fill="#16A34A">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="78" cy="170" r="4" fill="#16A34A">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.7s" repeatCount="indefinite" />
  </circle>
</svg>
